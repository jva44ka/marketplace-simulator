services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: etcd
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd-data
    environment:
      ETCDCTL_API: "3"
    ports:
      - "2379:2379"
    volumes:
      - etcd-data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  etcd-ui:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.etcd-ui
    container_name: etcd-ui
    ports:
      - "8091:8080"
    depends_on:
      etcd:
        condition: service_healthy

  kafka:
    image: confluentinc/cp-kafka:7.9.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  product:
    image: jva44ka/marketplace-simulator-product:latest
    container_name: product
    ports:
      - "5001:5000"
    environment:
      CONFIG_PATH: /app/configs/product.yaml
    volumes:
      - ./configs/product.yaml:/app/configs/product.yaml:ro
    depends_on:
      product-db:
        condition: service_started
      kafka:
        condition: service_healthy
      etcd:
        condition: service_healthy

  cart:
    image: jva44ka/marketplace-simulator-cart:latest
    container_name: cart
    ports:
      - "5002:5000"
    environment:
      CONFIG_PATH: /app/configs/cart.yaml
    volumes:
      - ./configs/cart.yaml:/app/configs/cart.yaml:ro
    depends_on:
      cart-db:
        condition: service_started
      etcd:
        condition: service_healthy

  product-db:
    image: postgres:17.7
    container_name: product-db
    environment:
      POSTGRES_DB: marketplace-simulator-product
      POSTGRES_USER: product
      POSTGRES_PASSWORD: product
    ports:
      - "5433:5432"
    volumes:
      - product-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product -d marketplace-simulator-product"]
      interval: 5s
      timeout: 5s
      retries: 10

  product-migrations:
    image: jva44ka/marketplace-simulator-product:migrator
    container_name: product-migrations
    depends_on:
      product-db:
        condition: service_healthy
    command: "postgres://product:product@product-db:5432/marketplace-simulator-product?sslmode=disable up"

  cart-db:
    image: postgres:17.7
    container_name: cart-db
    environment:
      POSTGRES_DB: marketplace-simulator-cart
      POSTGRES_USER: cart
      POSTGRES_PASSWORD: cart
    ports:
      - "5434:5432"
    volumes:
      - cart-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cart -d marketplace-simulator-cart"]
      interval: 5s
      timeout: 5s
      retries: 10

  cart-migrations:
    image: jva44ka/marketplace-simulator-cart:migrator
    container_name: cart-migrations
    depends_on:
      cart-db:
        condition: service_healthy
    command: "postgres://cart:cart@cart-db:5432/marketplace-simulator-cart?sslmode=disable up"

  loadgen:
    image: jva44ka/marketplace-simulator-loadgen:latest
    container_name: loadgen
    environment:
      CONFIG_PATH: /app/configs/loadgen.yaml
    volumes:
      - ./configs/loadgen.yaml:/app/configs/loadgen.yaml:ro
    depends_on:
      kafka:
        condition: service_healthy
      product:
        condition: service_started
      cart:
        condition: service_started
      etcd:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - product
      - cart

  tempo:
    image: grafana/tempo:2.6.1
    container_name: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./configs/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "3200:3200"   # Tempo HTTP API (for Grafana queries)

  loki:
    image: grafana/loki:3.4.2
    container_name: loki
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./configs/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.4.2
    container_name: promtail
    command: ["-config.file=/etc/promtail/promtail.yaml"]
    volumes:
      - ./configs/promtail.yaml:/etc/promtail/promtail.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - tempo
      - loki

volumes:
  loki-data:
  product-db-data:
  cart-db-data:
  grafana-data:
  kafka-data:
  tempo-data:
  prometheus-data:
  etcd-data:
