server:
  host:
  port: 5000

products:
  schema: http
  host: product
  port: 8002
  auth-token: admin
  timeout: 30s
  circuit-breaker:
    enabled: true
    half-open-requests: 3
    interval: 10s
    timeout: 5s
    threshold: 0.6
    min-requests-to-trip: 10
  retry:
    enabled: true
    max-attempts: 3
    initial-backoff: 100ms
    max-backoff: 1s
    multiplier: 2.0
    jitter-factor: 0.2

database:
  user: cart
  password: cart
  host: cart-db
  port: 5432
  name: marketplace-simulator-cart

tracing:
  enabled: true
  otlp-endpoint: tempo:4317

etcd:
  endpoints:
    - etcd:2379
  dial-timeout: 5s
  config-key: /config/cart

jobs:
  reservation-confirmation-outbox:
    enabled: true
    idle-interval: 10ms
    active-interval: 0s
    batch-size: 100
    max-retries: 5
  reservation-confirmation-outbox-monitor:
    enabled: true
    job-interval: 10s