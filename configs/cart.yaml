server:
  host:
  port: 5000

products:
  schema: http
  host: products
  port: 8002
  auth-token: admin
  timeout: 30s

database:
  user: cart
  password: cart
  host: cart-db
  port: 5432
  name: ozon-simulator-go-cart

jobs:
  reservation-expired-consumer:
    enabled: true

kafka:
  brokers:
    - kafka:9092
  topics:
    - name: reservation-expired-topic
      consumer-group: cart-reservation-consumer
