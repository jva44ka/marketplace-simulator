product-client:
  host: product
  port: 5000
  auth-token: admin
  timeout: 30s

cart-client:
  host: cart
  port: 5000
  timeout: 30s

kafka:
  brokers:
    - kafka:9092
  product-events-topic: product.events
  consumer-group: loadgen

sku-range:
  min: 1
  max: 200

workers:
  replenisher:
    enabled: true
    parallelism: 3
    low-stock-threshold: 10
    replenish-count: 50

  order-flow:
    enabled: true
    parallelism: 200
    rps: 300

  cart-viewer:
    enabled: true
    parallelism: 10
    rps: 200
