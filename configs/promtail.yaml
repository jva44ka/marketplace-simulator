server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: status
            values: [running]
    relabel_configs:
      # имя контейнера → label container
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container
      # имя сервиса из docker-compose → label service
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      # stdout / stderr
      - source_labels: [__meta_docker_container_log_stream]
        target_label: logstream
    pipeline_stages:
      # сервисы пишут JSON — парсим чтобы достать level, msg и другие поля
      - json:
          expressions:
            level: level
            msg: msg
      - labels:
          level:
